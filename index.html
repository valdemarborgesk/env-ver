<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Platform Versions</title>
  <link rel="icon" href="https://kelvin.ai/favicon.ico" />
  <!-- DataTables CSS -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" />
  <!-- Optional: DataTables Dark Theme -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" />
  <style>
    :root {
      --background-gradient: linear-gradient(160deg, #f4f8fb 0%, #e6f1ff 100%);
      --color-bg: #f4f8fb;
      --color-surface: #ffffff;
      --color-surface-alt: #eef5ff;
      --color-text: #112240;
      --color-muted: #5d738e;
      --color-border: rgba(17, 34, 64, 0.1);
      --color-accent: #00a3ff;
      --color-accent-strong: #0082d1;
      --color-link: #006ecb;
      --table-header-bg: #0f2f57;
      --table-row-hover: rgba(0, 163, 255, 0.08);
      --code-bg: rgba(0, 163, 255, 0.08);
      --brand-glow: rgba(0, 163, 255, 0.26);
    }

    body.dark {
      --background-gradient: linear-gradient(160deg, #081529 0%, #020b17 100%);
      --color-bg: #0b1a30;
      --color-surface: #111f36;
      --color-surface-alt: #15263f;
      --color-text: #e3f1ff;
      --color-muted: #92abc7;
      --color-border: rgba(111, 170, 255, 0.18);
      --color-accent: #46c6ff;
      --color-accent-strong: #5fd3ff;
      --color-link: #7dd8ff;
      --table-header-bg: #123b67;
      --table-row-hover: rgba(70, 198, 255, 0.14);
      --code-bg: rgba(70, 198, 255, 0.18);
      --brand-glow: rgba(70, 198, 255, 0.32);
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: var(--background-gradient);
      color: var(--color-text);
      min-height: 100vh;
      padding: 56px 24px;
      transition: background 0.35s ease, color 0.35s ease;
    }

    .main-container {
      position: relative;
      max-width: 1180px;
      margin: 0 auto;
      background: var(--color-surface);
      border-radius: 24px;
      box-shadow: 0 28px 60px rgba(9, 25, 46, 0.18);
      border: 1px solid var(--color-border);
      padding: 48px 52px;
      transition: background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
      overflow: hidden;
    }

    .main-container::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(120% 120% at 90% 0%, rgba(0, 163, 255, 0.16) 0%, rgba(0, 163, 255, 0) 52%);
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    body.dark .main-container::before {
      background: radial-gradient(120% 120% at 90% 0%, rgba(70, 198, 255, 0.24) 0%, rgba(70, 198, 255, 0) 55%);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.0rem, 1.3vw, 1.2rem);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 8px 14px;
      display: inline-block;
      border-radius: 999px;
      background: rgba(0, 163, 255, 0.12);
      border: 1px solid rgba(0, 163, 255, 0.24);
      color: var(--color-link);
      box-shadow: 0 8px 18px rgba(0, 163, 255, 0.16);
    }

    body.dark h1 {
      background: rgba(70, 198, 255, 0.16);
      border-color: rgba(70, 198, 255, 0.28);
      color: var(--color-text);
      box-shadow: 0 10px 24px rgba(70, 198, 255, 0.2);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 1rem;
      color: var(--color-muted);
    }

    .page-header {
      display: flex;
      flex-direction: column;
      gap: 24px;
      margin-bottom: 32px;
      padding: 0 24px;
    }

    .brand-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      width: 100%;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 14px;
      margin: 0;
    }

    .page-title {
      max-width: 620px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin: 0 auto;
    }

    .brand-mark img {
      height: min(9vw, 106px);
      width: auto;
      display: block;
      filter: drop-shadow(0 10px 24px rgba(0, 163, 255, 0.25));
    }

    .header-actions {
      display: flex;
      gap: 12px;
      margin-left: auto;
      align-items: center;
    }

    #apiReferenceLink {
      background: var(--color-surface);
      color: var(--color-text);
      border: 2px solid var(--color-border);
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    #apiReferenceLink:hover {
      transform: translateY(-1px);
      border-color: var(--color-accent);
      background: var(--color-surface-alt);
    }

    #apiReferenceLink:focus-visible {
      outline: 3px solid rgba(0, 163, 255, 0.35);
      outline-offset: 4px;
    }

    #toggleDarkMode {
      background: linear-gradient(140deg, var(--color-accent), var(--color-accent-strong));
      color: #ffffff;
      border: none;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 16px 30px var(--brand-glow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    #toggleDarkMode:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 34px var(--brand-glow);
      opacity: 0.95;
    }

    #toggleDarkMode:focus-visible {
      outline: 3px solid rgba(0, 163, 255, 0.35);
      outline-offset: 4px;
    }

    .table-card {
      position: relative;
      background: var(--color-surface);
      border-radius: 18px;
      border: 1px solid var(--color-border);
      padding: 24px;
      box-shadow: 0 20px 40px rgba(12, 36, 64, 0.12);
      transition: background 0.35s ease, border-color 0.35s ease;
    }

    .table-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(120deg, rgba(0, 163, 255, 0.12), rgba(0, 163, 255, 0));
      opacity: 0.6;
      pointer-events: none;
    }

    body.dark .table-card::before {
      background: linear-gradient(120deg, rgba(70, 198, 255, 0.2), rgba(70, 198, 255, 0));
    }

    .table-card .dataTables_wrapper {
      width: 100%;
    }

    a {
      color: var(--color-link);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    a:hover,
    a:focus-visible {
      color: var(--color-accent-strong);
    }

    .metadata-link {
      color: var(--color-muted);
      font-weight: 600;
      cursor: pointer;
    }

    .metadata-link:hover,
    .metadata-link:focus-visible {
      color: var(--color-link);
    }

    .version-cell {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .version-cell code {
      background: var(--code-bg);
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--color-text);
      border: 1px solid rgba(17, 34, 64, 0.08);
    }

    body.dark .version-cell code {
      border-color: rgba(143, 181, 222, 0.32);
      color: var(--color-text);
    }

    table.dataTable thead th {
      background-color: var(--table-header-bg) !important;
      color: #fff !important;
      border-bottom: none !important;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    table.dataTable tbody tr {
      background-color: var(--color-surface) !important;
      transition: background-color 0.2s ease;
    }

    table.dataTable tbody tr:nth-child(even) {
      background-color: var(--color-surface-alt) !important;
    }

    table.dataTable tbody tr:hover {
      background-color: var(--table-row-hover) !important;
    }

    table.dataTable td,
    table.dataTable th {
      border-bottom: 1px solid var(--color-border);
    }

    table.dataTable td {
      padding: 14px 16px;
      vertical-align: top;
      color: var(--color-text);
      line-height: 1.55;
    }

    table.dataTable a {
      color: var(--color-link);
      font-weight: 600;
      text-decoration: none;
    }

    table.dataTable a:hover {
      text-decoration: underline;
    }

    .dataTables_wrapper .dataTables_filter input,
    .dataTables_wrapper .dataTables_length select {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      color: var(--color-text);
      border-radius: 10px;
      padding: 8px 12px;
      outline: none;
      font-weight: 500;
    }

    .dataTables_wrapper .dataTables_filter input:focus,
    .dataTables_wrapper .dataTables_length select:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(0, 163, 255, 0.2);
    }

    .dataTables_wrapper .dataTables_filter label,
    .dataTables_wrapper .dataTables_length label,
    .dataTables_wrapper .dataTables_info {
      color: var(--color-muted);
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .dataTables_wrapper .dataTables_info {
      margin-top: 14px;
    }

    .dataTables_wrapper .dataTables_paginate .paginate_button {
      background: transparent !important;
      color: var(--color-text) !important;
      border-radius: 8px !important;
      border: 1px solid transparent !important;
      margin: 0 2px !important;
      padding: 6px 12px !important;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .dataTables_wrapper .dataTables_paginate .paginate_button.current,
    .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
      background: linear-gradient(135deg, var(--color-accent), var(--color-accent-strong)) !important;
      color: #fff !important;
      border-color: transparent !important;
      box-shadow: 0 6px 14px var(--brand-glow);
    }

    code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: "Source Code Pro", "Fira Code", monospace;
      font-size: 0.9rem;
    }

    .muted {
      color: var(--color-muted);
    }

    .kv-pair {
      margin-bottom: 6px;
      line-height: 1.4;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .kv-key {
      font-weight: 600;
      color: var(--color-text);
      margin-right: 6px;
    }

    .kv-key::after {
      content: ":";
      margin-left: 1px;
    }

    .kv-pair:last-child {
      margin-bottom: 0;
    }

    .metadata-tooltip-wrapper {
      position: relative;
      display: inline-block;
    }

    .metadata-tooltip {
      position: fixed;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 20px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
        0 30px 60px rgba(0, 0, 0, 0.3);
      z-index: 10000;
      box-sizing: border-box;
      min-width: min(900px, calc(100vw - 40px));
      max-width: calc(100vw - 40px);
      width: max-content;
      max-height: calc(100vh - 40px);
      opacity: 0;
      pointer-events: none;
      transform: scale(0.95);
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: normal;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .metadata-tooltip.visible {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .metadata-tooltip::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 16px;
      background: linear-gradient(135deg,
        rgba(255, 255, 255, 0.1) 0%,
        rgba(255, 255, 255, 0) 50%,
        rgba(0, 0, 0, 0.1) 100%);
      pointer-events: none;
      z-index: -1;
    }

    .metadata-tooltip .metadata-content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .metadata-json-wrapper {
      flex: 1;
      overflow: auto;
      min-height: 0;
      margin-bottom: 12px;
    }

    /* Custom scrollbar for JSON content */
    .metadata-json-wrapper::-webkit-scrollbar {
      width: 10px;
    }

    .metadata-json-wrapper::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      margin: 4px;
    }

    .metadata-json-wrapper::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      border: 2px solid rgba(0, 0, 0, 0.2);
    }

    .metadata-json-wrapper::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* Firefox scrollbar */
    .metadata-json-wrapper {
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.2) rgba(0, 0, 0, 0.2);
    }

    .metadata-tooltip pre {
      margin: 0;
      overflow: visible;
    }

    .metadata-tooltip.loading {
      text-align: center;
      color: var(--color-muted);
      font-size: 0.9rem;
    }

    .metadata-tooltip.error {
      color: #ef4444;
      font-size: 0.9rem;
    }

    .metadata-tooltip-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 16px;
      color: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      padding-bottom: 12px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
      letter-spacing: 0.02em;
    }

    .metadata-content {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .metadata-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .metadata-label {
      font-size: 0.8rem;
      color: var(--color-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .metadata-value {
      font-size: 0.9rem;
      color: var(--color-text);
      font-weight: 500;
    }

    .metadata-value code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    .metadata-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .metadata-btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
    }

    .copy-metadata-btn {
      background: rgba(0, 163, 255, 0.2);
      color: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0, 163, 255, 0.4);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 12px rgba(0, 163, 255, 0.2);
    }

    .copy-metadata-btn:hover {
      background: rgba(0, 163, 255, 0.3);
      border-color: rgba(0, 163, 255, 0.6);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 163, 255, 0.3);
    }

    .copy-metadata-btn:active {
      transform: translateY(0);
    }

    .copy-metadata-btn.copied {
      background: rgba(16, 185, 129, 0.3);
      border-color: rgba(16, 185, 129, 0.5);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .view-metadata-btn {
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
    }

    .view-metadata-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
    }

    @media (max-width: 768px) {
      body {
        padding: 32px 16px;
      }

      .main-container {
        padding: 32px 24px;
      }

      .header-actions {
        flex-direction: column;
        width: 100%;
        margin-left: 0;
      }

      #apiReferenceLink,
      #toggleDarkMode {
        width: 100%;
        justify-content: center;
      }

      .page-header {
        gap: 20px;
        padding: 16px 24px 0 24px;
      }

      .brand-row {
        flex-direction: column;
        align-items: center;
        width: 100%;
      }

      .page-title {
        max-width: none;
        align-items: center;
      }

      .brand-mark {
        align-self: center;
        margin-bottom: 12px;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 24px 14px;
      }

      .page-header {
        padding: 16px 18px 0 18px;
      }

      .main-container {
        padding: 28px 20px;
      }

      .brand-mark {
        margin-bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="main-container">
    <header class="page-header">
      <div class="brand-row">
        <div class="brand-mark">
          <img src="assets/kelvin-logo.png" alt="Kelvin logo" />
        </div>
        <div class="header-actions">
          <a id="apiReferenceLink" href="api-docs.html" target="_blank" rel="noopener noreferrer">📚 API Docs</a>
          <button id="toggleDarkMode" type="button" aria-live="polite" aria-pressed="false">🌙 Dark Mode</button>
        </div>
      </div>
      <div class="page-title">
        <h1>Platform Versions</h1>
        <p class="subtitle">Live view of environment releases across the Kelvin platform.</p>
      </div>
    </header>
    <div class="table-card">
      <table id="versionsTable" class="display" style="width:100%">
        <thead>
          <tr>
            <th>Environment</th>
            <th>Core</th>
            <th>Core UI</th>
            <th>Core API</th>
            <th>API Spec</th>
            <th>Metadata</th>
            <th>Other</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js" defer></script>
  <!-- DataTables JS -->
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js" defer></script>
  <script>
    // Dark Mode Toggle
    const toggleButton = document.getElementById("toggleDarkMode");
    const savedTheme = localStorage.getItem("theme");
    const userPrefersDark = savedTheme ? savedTheme === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;

    if (userPrefersDark) document.body.classList.add("dark");
    const setToggleState = () => {
      const isDark = document.body.classList.contains("dark");
      toggleButton.textContent = isDark ? "☀️ Light Mode" : "🌙 Dark Mode";
      toggleButton.setAttribute("aria-pressed", String(isDark));
    };
    setToggleState();

    const versionPlaceholder = '<span class="muted">N/A</span>';

    const getVersionSortValue = (value) => {
      if (value === undefined || value === null || value === "") return "";
      const parts = String(value).match(/\d+/g);
      if (!parts) return "";
      return parts.map((part) => part.padStart(6, "0")).join(".");
    };

    const createVersionCell = (version, suffix = "") => {
      const suffixHtml = suffix ? ` ${suffix}` : "";
      if (version === undefined || version === null || version === "") {
        return {
          display: `${versionPlaceholder}${suffixHtml}`,
          sort: "",
          filter: ""
        };
      }

      const sortValue = getVersionSortValue(version);
      return {
        display: `<span class="version-cell"><code>${version}</code>${suffixHtml}</span>`,
        sort: sortValue,
        filter: version
      };
    };

    const versionColumnRender = {
      _: "display",
      sort: "sort",
      filter: "filter"
    };

    toggleButton.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      setToggleState();
    });

    // Fetch and populate DataTable
    async function populateTable() {
      try {
        const [versionsResp, urlsResp] = await Promise.all([
          fetch("https://central-server.kelvininc.com/platformversions"),
          fetch("https://central-server.kelvininc.com/platformurls")
        ]);
        const [versions, urls] = await Promise.all([
          versionsResp.json(),
          urlsResp.json()
        ]);
        const tableData = Object.entries(versions).map(([env, versionInfo]) => {
          let baseUrl = urls[env] || `${env}.kelvin.ai`;
          if (!/^https?:\/\//.test(baseUrl)) {
            baseUrl = `https://${baseUrl}`;
          }
          const envLink = `<a href="${baseUrl}" target="_blank" rel="noopener noreferrer">${env}</a>`;
          const metadataLink = `<span class="metadata-tooltip-wrapper"><a class="metadata-link" href="${baseUrl}/metadata" target="_blank" rel="noopener noreferrer" data-metadata-url="${baseUrl}/metadata" data-env="${env}" data-metadata='${JSON.stringify(versionInfo)}'>/metadata</a></span>`;
          const othersHtml = Object.entries(versionInfo)
            .filter(([key]) => !["core", "core-ui", "core-api", "api-spec"].includes(key))
            .map(([key, val]) => {
              const valueMarkup = (val === undefined || val === null || val === "")
                ? versionPlaceholder
                : `<code>${val}</code>`;
              return `<div class="kv-pair"><span class="kv-key">${key}</span>${valueMarkup}</div>`;
            })
            .join("");

          return {
            environment: envLink,
            core: createVersionCell(versionInfo["core"]),
            coreUi: createVersionCell(versionInfo["core-ui"]),
            coreApi: createVersionCell(versionInfo["core-api"]),
            apiSpec: createVersionCell(versionInfo["api-spec"]),
            metadata: metadataLink,
            others: othersHtml || versionPlaceholder
          };
        });

        $("#versionsTable").DataTable({
          data: tableData,
          columns: [
            { title: "Environment", data: "environment" },
            { title: "Core", data: "core", render: versionColumnRender },
            { title: "Core UI", data: "coreUi", render: versionColumnRender },
            { title: "Core API", data: "coreApi", render: versionColumnRender },
            { title: "API Spec", data: "apiSpec", render: versionColumnRender },
            { title: "Metadata", data: "metadata" },
            { title: "Other", data: "others" }
          ],
          order: [[1, "desc"]],
          pageLength: 50,
          responsive: true
        });
      } catch (err) {
        document.body.insertAdjacentHTML("beforeend", "<p style=\"color:red;\">Failed to load version data.</p>");
        console.error(err);
      }
    }

    populateTable();

    // Metadata tooltip functionality - load from local files fetched by GitHub Action
    function createLoadingTooltip(env) {
      return `
        <div class="metadata-tooltip-title">${env} Metadata</div>
        <div class="metadata-content">
          <p style="color: var(--color-muted); font-size: 0.9rem; margin: 0; text-align: center;">
            Loading metadata...
          </p>
        </div>
      `;
    }

    function createMetadataTooltip(env, metadata, metadataUrl) {
      const formattedJson = JSON.stringify(metadata, null, 2);

      return `
        <div class="metadata-tooltip-title">${env} Metadata</div>
        <div class="metadata-content">
          <div class="metadata-json-wrapper">
            <pre style="background: rgba(0, 0, 0, 0.3); padding: 16px; border-radius: 12px; font-size: 0.85rem; color: rgba(255, 255, 255, 0.9); font-family: 'JetBrains Mono', 'Fira Code', monospace; white-space: pre-wrap; word-break: break-word; border: 1px solid rgba(255, 255, 255, 0.08); line-height: 1.6;">${formattedJson}</pre>
          </div>
          <div class="metadata-actions">
            <button class="metadata-btn copy-metadata-btn" data-metadata='${formattedJson}'>
              📋 Copy JSON
            </button>
            <a href="${metadataUrl}" target="_blank" rel="noopener noreferrer" class="metadata-btn view-metadata-btn">
              🔗 View Full
            </a>
          </div>
        </div>
      `;
    }

    // Position tooltip near the trigger element
    function positionTooltip(tooltip, triggerElement) {
      const triggerRect = triggerElement.getBoundingClientRect();
      const tooltipRect = tooltip.getBoundingClientRect();
      const viewportWidth = window.innerWidth;
      const viewportHeight = window.innerHeight;
      const margin = 20;

      // Calculate position - align to the right edge of the screen
      let top = triggerRect.bottom + 8;
      let left = viewportWidth - tooltipRect.width - margin;

      // Check if tooltip goes below viewport
      if (top + tooltipRect.height > viewportHeight - margin) {
        // Show above the element instead
        top = triggerRect.top - tooltipRect.height - 8;
      }

      // Ensure tooltip doesn't go off screen vertically - maintain equal margins
      if (top < margin) {
        top = margin;
      } else if (top + tooltipRect.height > viewportHeight - margin) {
        // Ensure equal bottom margin
        top = viewportHeight - tooltipRect.height - margin;
      }

      tooltip.style.top = `${top}px`;
      tooltip.style.left = `${left}px`;
    }

    // Cache for loaded metadata
    const metadataCache = new Map();

    async function loadMetadata(env) {
      if (metadataCache.has(env)) {
        return metadataCache.get(env);
      }

      try {
        // Try to load from local file first (fetched by GitHub Action)
        const response = await fetch(`metadata/${env}.json`);
        if (response.ok) {
          const data = await response.json();
          metadataCache.set(env, data);
          return data;
        }
      } catch (error) {
        console.warn(`Failed to load local metadata for ${env}:`, error);
      }

      // Fallback to platformversions data if local file doesn't exist
      return null;
    }

    // Click to toggle tooltip
    document.addEventListener('click', async (e) => {
      const link = e.target.closest('.metadata-link');

      if (link) {
        e.preventDefault();

        // Check if this link already has a tooltip
        const existingTooltip = document.querySelector('.metadata-tooltip[data-env="' + link.dataset.env + '"]');

        if (existingTooltip) {
          const isVisible = existingTooltip.classList.contains('visible');
          // Close all tooltips
          document.querySelectorAll('.metadata-tooltip.visible').forEach(t => {
            t.classList.remove('visible');
          });

          if (!isVisible) {
            existingTooltip.classList.add('visible');
            positionTooltip(existingTooltip, link);
          }
          return;
        }

        // Close all other tooltips
        document.querySelectorAll('.metadata-tooltip.visible').forEach(t => {
          t.classList.remove('visible');
        });

        const env = link.dataset.env;
        const metadataUrl = link.dataset.metadataUrl;

        // Create new tooltip and add to body
        const tooltip = document.createElement('div');
        tooltip.className = 'metadata-tooltip';
        tooltip.setAttribute('data-env', env);
        tooltip.innerHTML = createLoadingTooltip(env);
        document.body.appendChild(tooltip);

        // Position and show
        positionTooltip(tooltip, link);
        tooltip.classList.add('visible');

        // Load metadata from local file
        const metadata = await loadMetadata(env);

        if (metadata) {
          tooltip.innerHTML = createMetadataTooltip(env, metadata, metadataUrl);
        } else {
          // Fallback to basic data we have
          const fallbackData = JSON.parse(link.dataset.metadata || '{}');
          tooltip.innerHTML = createMetadataTooltip(env, fallbackData, metadataUrl);
        }

        // Reposition after content is loaded
        setTimeout(() => positionTooltip(tooltip, link), 0);
      } else {
        // Click outside - close all tooltips unless clicking on tooltip itself
        if (!e.target.closest('.metadata-tooltip')) {
          document.querySelectorAll('.metadata-tooltip.visible').forEach(t => {
            t.classList.remove('visible');
          });
        }
      }
    });

    // Handle copy button clicks
    document.addEventListener('click', async (e) => {
      if (e.target.closest('.copy-metadata-btn')) {
        const btn = e.target.closest('.copy-metadata-btn');
        const metadata = btn.dataset.metadata;

        try {
          await navigator.clipboard.writeText(metadata);
          const originalText = btn.innerHTML;
          btn.innerHTML = '✓ Copied!';
          btn.classList.add('copied');

          setTimeout(() => {
            btn.innerHTML = originalText;
            btn.classList.remove('copied');
          }, 2000);
        } catch (err) {
          console.error('Failed to copy:', err);
          btn.innerHTML = '✗ Failed';
          setTimeout(() => {
            btn.innerHTML = '📋 Copy JSON';
          }, 2000);
        }
      }
    });

  </script>
</body>
</html>
