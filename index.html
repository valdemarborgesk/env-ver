<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Platform Versions</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
    h1 { color: #333; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
    th { background-color: #007acc; color: white; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    code { background: #eee; padding: 2px 4px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Platform Versions</h1>
  <table id="versionsTable">
    <thead>
      <tr>
        <th>Environment</th>
        <th>Core</th>
        <th>Core UI</th>
        <th>Core API</th>
        <th>API Spec</th>
        <th>Other</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    fetch('https://central-server.kelvininc.com/platformversions')
      .then(response => response.json())
      .then(data => {
        const tbody = document.querySelector('#versionsTable tbody');
        Object.entries(data).forEach(([env, versions]) => {
          const row = document.createElement('tr');
          const core = versions['core'] || '';
          const coreUI = versions['core-ui'] || '';
          const coreAPI = versions['core-api'] || '';
          const apiSpec = versions['api-spec'] || '';
          const others = Object.entries(versions)
            .filter(([key]) => !['core', 'core-ui', 'core-api', 'api-spec'].includes(key))
            .map(([key, val]) => `${key}: <code>${val}</code>`)
            .join('<br>');

          row.innerHTML = `
            <td><strong>${env}</strong></td>
            <td><code>${core}</code></td>
            <td><code>${coreUI}</code></td>
            <td><code>${coreAPI}</code></td>
            <td><code>${apiSpec}</code></td>
            <td>${others}</td>
          `;
          tbody.appendChild(row);
        });
      })
      .catch(err => {
        document.body.innerHTML = '<p style="color:red;">Failed to load version data.</p>';
        console.error(err);
      });
  </script>
</body>
</html>
