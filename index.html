<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Platform Versions</title>
  <link rel="icon" href="https://kelvin.ai/favicon.ico" />
  <!-- DataTables CSS -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" />
  <!-- Optional: DataTables Dark Theme -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" />
  <style>
    :root {
      --background-gradient: linear-gradient(160deg, #f4f8fb 0%, #e6f1ff 100%);
      --color-bg: #f4f8fb;
      --color-surface: #ffffff;
      --color-surface-alt: #eef5ff;
      --color-text: #112240;
      --color-muted: #5d738e;
      --color-border: rgba(17, 34, 64, 0.1);
      --color-accent: #00a3ff;
      --color-accent-strong: #0082d1;
      --color-link: #006ecb;
      --table-header-bg: #0f2f57;
      --table-row-hover: rgba(0, 163, 255, 0.08);
      --code-bg: rgba(0, 163, 255, 0.08);
      --brand-glow: rgba(0, 163, 255, 0.26);
    }

    body.dark {
      --background-gradient: linear-gradient(160deg, #081529 0%, #020b17 100%);
      --color-bg: #0b1a30;
      --color-surface: #111f36;
      --color-surface-alt: #15263f;
      --color-text: #e3f1ff;
      --color-muted: #92abc7;
      --color-border: rgba(111, 170, 255, 0.18);
      --color-accent: #46c6ff;
      --color-accent-strong: #5fd3ff;
      --color-link: #7dd8ff;
      --table-header-bg: #123b67;
      --table-row-hover: rgba(70, 198, 255, 0.14);
      --code-bg: rgba(70, 198, 255, 0.18);
      --brand-glow: rgba(70, 198, 255, 0.32);
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: var(--background-gradient);
      color: var(--color-text);
      min-height: 100vh;
      padding: 56px 24px;
      transition: background 0.35s ease, color 0.35s ease;
    }

    .main-container {
      position: relative;
      max-width: 1180px;
      margin: 0 auto;
      background: var(--color-surface);
      border-radius: 24px;
      box-shadow: 0 28px 60px rgba(9, 25, 46, 0.18);
      border: 1px solid var(--color-border);
      padding: 48px 52px;
      transition: background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
      overflow: hidden;
    }

    .main-container::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(120% 120% at 90% 0%, rgba(0, 163, 255, 0.16) 0%, rgba(0, 163, 255, 0) 52%);
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    body.dark .main-container::before {
      background: radial-gradient(120% 120% at 90% 0%, rgba(70, 198, 255, 0.24) 0%, rgba(70, 198, 255, 0) 55%);
    }

    h1 {
      margin: 0;
      font-size: 2.3rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 10px 18px;
      display: inline-block;
      border-radius: 999px;
      background: rgba(0, 163, 255, 0.12);
      border: 1px solid rgba(0, 163, 255, 0.24);
      color: var(--color-link);
      box-shadow: 0 12px 24px rgba(0, 163, 255, 0.18);
    }

    body.dark h1 {
      background: rgba(70, 198, 255, 0.18);
      border-color: rgba(70, 198, 255, 0.32);
      color: var(--color-text);
      box-shadow: 0 14px 28px rgba(70, 198, 255, 0.22);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 1rem;
      color: var(--color-muted);
    }

    .page-header {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 32px;
    }

    .page-title {
      max-width: 620px;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .brand-mark img {
      height: 48px;
      width: auto;
      display: block;
      filter: drop-shadow(0 10px 24px rgba(0, 163, 255, 0.25));
    }

    #toggleDarkMode {
      background: linear-gradient(140deg, var(--color-accent), var(--color-accent-strong));
      color: #ffffff;
      border: none;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 16px 30px var(--brand-glow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    #toggleDarkMode:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 34px var(--brand-glow);
      opacity: 0.95;
    }

    #toggleDarkMode:focus-visible {
      outline: 3px solid rgba(0, 163, 255, 0.35);
      outline-offset: 4px;
    }

    .table-card {
      position: relative;
      background: var(--color-surface);
      border-radius: 18px;
      border: 1px solid var(--color-border);
      padding: 24px;
      box-shadow: 0 20px 40px rgba(12, 36, 64, 0.12);
      transition: background 0.35s ease, border-color 0.35s ease;
    }

    .table-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(120deg, rgba(0, 163, 255, 0.12), rgba(0, 163, 255, 0));
      opacity: 0.6;
      pointer-events: none;
    }

    body.dark .table-card::before {
      background: linear-gradient(120deg, rgba(70, 198, 255, 0.2), rgba(70, 198, 255, 0));
    }

    .table-card .dataTables_wrapper {
      width: 100%;
    }

    a {
      color: var(--color-link);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    a:hover,
    a:focus-visible {
      color: var(--color-accent-strong);
    }

    .metadata-link {
      color: var(--color-muted);
      font-weight: 600;
    }

    .metadata-link:hover,
    .metadata-link:focus-visible {
      color: var(--color-link);
    }

    .version-cell {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .version-cell code {
      background: var(--code-bg);
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--color-text);
      border: 1px solid rgba(17, 34, 64, 0.08);
    }

    body.dark .version-cell code {
      border-color: rgba(143, 181, 222, 0.32);
      color: var(--color-text);
    }

    table.dataTable thead th {
      background-color: var(--table-header-bg) !important;
      color: #fff !important;
      border-bottom: none !important;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    table.dataTable tbody tr {
      background-color: var(--color-surface) !important;
      transition: background-color 0.2s ease;
    }

    table.dataTable tbody tr:nth-child(even) {
      background-color: var(--color-surface-alt) !important;
    }

    table.dataTable tbody tr:hover {
      background-color: var(--table-row-hover) !important;
    }

    table.dataTable td,
    table.dataTable th {
      border-bottom: 1px solid var(--color-border);
    }

    table.dataTable td {
      padding: 14px 16px;
      vertical-align: top;
      color: var(--color-text);
      line-height: 1.55;
    }

    table.dataTable a {
      color: var(--color-link);
      font-weight: 600;
      text-decoration: none;
    }

    table.dataTable a:hover {
      text-decoration: underline;
    }

    .dataTables_wrapper .dataTables_filter input,
    .dataTables_wrapper .dataTables_length select {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      color: var(--color-text);
      border-radius: 10px;
      padding: 8px 12px;
      outline: none;
      font-weight: 500;
    }

    .dataTables_wrapper .dataTables_filter input:focus,
    .dataTables_wrapper .dataTables_length select:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(0, 163, 255, 0.2);
    }

    .dataTables_wrapper .dataTables_filter label,
    .dataTables_wrapper .dataTables_length label,
    .dataTables_wrapper .dataTables_info {
      color: var(--color-muted);
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .dataTables_wrapper .dataTables_info {
      margin-top: 14px;
    }

    .dataTables_wrapper .dataTables_paginate .paginate_button {
      background: transparent !important;
      color: var(--color-text) !important;
      border-radius: 8px !important;
      border: 1px solid transparent !important;
      margin: 0 2px !important;
      padding: 6px 12px !important;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .dataTables_wrapper .dataTables_paginate .paginate_button.current,
    .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
      background: linear-gradient(135deg, var(--color-accent), var(--color-accent-strong)) !important;
      color: #fff !important;
      border-color: transparent !important;
      box-shadow: 0 6px 14px var(--brand-glow);
    }

    code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: "Source Code Pro", "Fira Code", monospace;
      font-size: 0.9rem;
    }

    .muted {
      color: var(--color-muted);
    }

    .kv-pair {
      margin-bottom: 6px;
      line-height: 1.4;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .kv-key {
      font-weight: 600;
      color: var(--color-text);
      margin-right: 6px;
    }

    .kv-key::after {
      content: ":";
      margin-left: 1px;
    }

    .kv-pair:last-child {
      margin-bottom: 0;
    }

    @media (max-width: 768px) {
      body {
        padding: 32px 16px;
      }

      .main-container {
        padding: 32px 24px;
      }

      #toggleDarkMode {
        width: 100%;
        justify-content: center;
      }

      .page-header {
        gap: 20px;
      }

      .page-title {
        max-width: none;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 24px 14px;
      }

      .page-header {
        flex-direction: column;
        align-items: stretch;
      }

      .main-container {
        padding: 28px 20px;
      }

      .brand-mark {
        margin-bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="main-container">
    <header class="page-header">
      <div class="page-title">
        <div class="brand-mark">
          <img src="assets/kelvin-logo.png" alt="Kelvin logo" />
        </div>
        <h1>Platform Versions</h1>
        <p class="subtitle">Live view of environment releases across the Kelvin platform.</p>
      </div>
      <button id="toggleDarkMode" type="button" aria-live="polite" aria-pressed="false">🌙 Dark Mode</button>
    </header>
    <div class="table-card">
      <table id="versionsTable" class="display" style="width:100%">
        <thead>
          <tr>
            <th>Environment</th>
            <th>Core</th>
            <th>Core UI</th>
            <th>Core API</th>
            <th>API Spec</th>
            <th>Other</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js" defer></script>
  <!-- DataTables JS -->
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js" defer></script>
  <script>
    // Dark Mode Toggle
    const toggleButton = document.getElementById("toggleDarkMode");
    const savedTheme = localStorage.getItem("theme");
    const userPrefersDark = savedTheme ? savedTheme === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;

    if (userPrefersDark) document.body.classList.add("dark");
    const setToggleState = () => {
      const isDark = document.body.classList.contains("dark");
      toggleButton.textContent = isDark ? "☀️ Light Mode" : "🌙 Dark Mode";
      toggleButton.setAttribute("aria-pressed", String(isDark));
    };
    setToggleState();

    const versionPlaceholder = '<span class="muted">N/A</span>';

    const getVersionSortValue = (value) => {
      if (value === undefined || value === null || value === "") return "";
      const parts = String(value).match(/\d+/g);
      if (!parts) return "";
      return parts.map((part) => part.padStart(6, "0")).join(".");
    };

    const createVersionCell = (version, suffix = "") => {
      const suffixHtml = suffix ? ` ${suffix}` : "";
      if (version === undefined || version === null || version === "") {
        return {
          display: `${versionPlaceholder}${suffixHtml}`,
          sort: "",
          filter: ""
        };
      }

      const sortValue = getVersionSortValue(version);
      return {
        display: `<span class="version-cell"><code>${version}</code>${suffixHtml}</span>`,
        sort: sortValue,
        filter: version
      };
    };

    const versionColumnRender = {
      _: "display",
      sort: "sort",
      filter: "filter"
    };

    toggleButton.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      setToggleState();
    });

    // Fetch and populate DataTable
    async function populateTable() {
      try {
        const [versionsResp, urlsResp] = await Promise.all([
          fetch("https://central-server.kelvininc.com/platformversions"),
          fetch("https://central-server.kelvininc.com/platformurls")
        ]);
        const [versions, urls] = await Promise.all([
          versionsResp.json(),
          urlsResp.json()
        ]);
        const tableData = Object.entries(versions).map(([env, versionInfo]) => {
          let baseUrl = urls[env] || `${env}.kelvin.ai`;
          if (!/^https?:\/\//.test(baseUrl)) {
            baseUrl = `https://${baseUrl}`;
          }
          const envLink = `<a href="${baseUrl}" target="_blank" rel="noopener noreferrer">${env}</a>`;
          const metadataLink = `<a class="metadata-link" href="${baseUrl}/metadata" target="_blank" rel="noopener noreferrer">/metadata</a>`;
          const metadataSuffix = `(${metadataLink})`;
          const othersHtml = Object.entries(versionInfo)
            .filter(([key]) => !["core", "core-ui", "core-api", "api-spec"].includes(key))
            .map(([key, val]) => {
              const valueMarkup = (val === undefined || val === null || val === "")
                ? versionPlaceholder
                : `<code>${val}</code>`;
              return `<div class="kv-pair"><span class="kv-key">${key}</span>${valueMarkup}</div>`;
            })
            .join("");

          return {
            environment: envLink,
            core: createVersionCell(versionInfo["core"], metadataSuffix),
            coreUi: createVersionCell(versionInfo["core-ui"]),
            coreApi: createVersionCell(versionInfo["core-api"]),
            apiSpec: createVersionCell(versionInfo["api-spec"]),
            others: othersHtml || versionPlaceholder
          };
        });

        $("#versionsTable").DataTable({
          data: tableData,
          columns: [
            { title: "Environment", data: "environment" },
            { title: "Core", data: "core", render: versionColumnRender },
            { title: "Core UI", data: "coreUi", render: versionColumnRender },
            { title: "Core API", data: "coreApi", render: versionColumnRender },
            { title: "API Spec", data: "apiSpec", render: versionColumnRender },
            { title: "Other", data: "others" }
          ],
          order: [[1, "desc"]],
          pageLength: 50,
          responsive: true
        });
      } catch (err) {
        document.body.insertAdjacentHTML("beforeend", "<p style=\"color:red;\">Failed to load version data.</p>");
        console.error(err);
      }
    }

    populateTable();

  </script>
</body>
</html>
