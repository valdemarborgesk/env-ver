<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Platform Versions</title>
  <style>
    /* Base Variables */
    :root {
      --bg-color: #f4f4f4;
      --text-color: #222;
      --table-bg: #fff;
      --table-alt: #f9f9f9;
      --header-bg: #007acc;
      --header-text: #fff;
      --border-color: #ddd;
    }

    body.dark {
      --bg-color: #121212;
      --text-color: #f0f0f0;
      --table-bg: #1e1e1e;
      --table-alt: #2a2a2a;
      --header-bg: #1f6feb;
      --header-text: #fff;
      --border-color: #444;
    }

    /* Layout Styling */
    body {
      font-family: Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      padding: 20px;
      margin: 0;
      transition: background 0.3s, color 0.3s;
    }

    h1 {
      margin-top: 0;
    }

    /* Toggle Button */
    #toggleDarkMode {
      float: right;
      margin-top: -10px;
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 5px;
      font-size: 0.9em;
      transition: background 0.3s, color 0.3s, border 0.3s;
    }

    /* Table Styling */
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--table-bg);
      margin-top: 20px;
    }

    th, td {
      padding: 10px;
      border: 1px solid var(--border-color);
      text-align: left;
    }

    th {
      background-color: var(--header-bg);
      color: var(--header-text);
    }

    tr:nth-child(even) {
      background-color: var(--table-alt);
    }

    code {
      background: #3332;
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <button id="toggleDarkMode">☀️ Light Mode</button>
  <h1>Platform Versions</h1>

  <table id="versionsTable">
    <thead>
      <tr>
        <th>Environment</th>
        <th>Core</th>
        <th>Core UI</th>
        <th>Core API</th>
        <th>API Spec</th>
        <th>Other</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    // Default to dark unless explicitly set to 'light'
    const theme = localStorage.getItem('theme');
    const prefersDark = theme !== 'light';
    const body = document.body;
    const toggleButton = document.getElementById('toggleDarkMode');

    if (prefersDark) body.classList.add('dark');
    toggleButton.textContent = body.classList.contains('dark') ? '☀️ Light Mode' : '🌙 Dark Mode';

    toggleButton.addEventListener('click', () => {
      body.classList.toggle('dark');
      const isDark = body.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      toggleButton.textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
    });

    // Fetch and render version data
    fetch('https://central-server.kelvininc.com/platformversions')
      .then(response => response.json())
      .then(data => {
        const tbody = document.querySelector('#versionsTable tbody');
        Object.entries(data).forEach(([env, versions]) => {
          const row = document.createElement('tr');
          const core = versions['core'] || '';
          const coreUI = versions['core-ui'] || '';
          const coreAPI = versions['core-api'] || '';
          const apiSpec = versions['api-spec'] || '';
          const others = Object.entries(versions)
            .filter(([key]) => !['core', 'core-ui', 'core-api', 'api-spec'].includes(key))
            .map(([key, val]) => `${key}: <code>${val}</code>`)
            .join('<br>');

          row.innerHTML = `
            <td><strong>${env}</strong></td>
            <td><code>${core}</code></td>
            <td><code>${coreUI}</code></td>
            <td><code>${coreAPI}</code></td>
            <td><code>${apiSpec}</code></td>
            <td>${others}</td>
          `;
          tbody.appendChild(row);
        });
      })
      .catch(err => {
        document.body.innerHTML += '<p style="color:red;">Failed to load version data.</p>';
        console.error(err);
      });
  </script>
</body>
</html>
