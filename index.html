<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Platform Versions</title>
  <!-- DataTables CSS -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" />
  <!-- Optional: DataTables Dark Theme -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s, color 0.3s;
    }

    :root {
      --bg-color: #f4f4f4;
      --text-color: #222;
    }

    body.dark {
      --bg-color: #121212;
      --text-color: #f0f0f0;
    }

    h1 {
      color: var(--text-color);
    }

    #toggleDarkMode {
      float: right;
      margin-top: -10px;
      background: none;
      border: 1px solid #ccc;
      color: var(--text-color);
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    table.dataTable thead th {
      background-color: #007acc;
      color: white;
    }

    code {
      background: #eee;
      padding: 2px 4px;
      border-radius: 4px;
    }

    body.dark code {
      background: #333;
    }
  </style>
</head>
<body>
  <button id="toggleDarkMode">🌙 Dark Mode</button>
  <h1>Platform Versions</h1>
  <table id="versionsTable" class="display" style="width:100%">
    <thead>
      <tr>
        <th>Environment</th>
        <th>Core</th>
        <th>Core UI</th>
        <th>Core API</th>
        <th>API Spec</th>
        <th>Other</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js" defer></script>
  <!-- DataTables JS -->
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js" defer></script>
  <script>
    // Dark Mode Toggle
    const toggleButton = document.getElementById("toggleDarkMode");
    const savedTheme = localStorage.getItem("theme");
    const userPrefersDark = savedTheme ? savedTheme === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;

    if (userPrefersDark) document.body.classList.add("dark");
    toggleButton.textContent = document.body.classList.contains("dark") ? "☀️ Light Mode" : "🌙 Dark Mode";

    toggleButton.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      toggleButton.textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // Fetch and populate DataTable
    async function populateTable() {
      try {
        const [versionsResp, urlsResp] = await Promise.all([
          fetch("https://central-server.kelvininc.com/platformversions"),
          fetch("https://central-server.kelvininc.com/platformurls")
        ]);
        const [versions, urls] = await Promise.all([
          versionsResp.json(),
          urlsResp.json()
        ]);
        const tableData = Object.entries(versions).map(([env, versionInfo]) => {
          let baseUrl = urls[env] || `${env}.kelvin.ai`;
          if (!/^https?:\/\//.test(baseUrl)) {
            baseUrl = `https://${baseUrl}`;
          }
          const envLink = `<a href="${baseUrl}" target="_blank" rel="noopener noreferrer">${env}</a>`;
          const metadataLink = `<a href="${baseUrl}/metadata" target="_blank" rel="noopener noreferrer">/metadata</a>`;
          const coreVersion = versionInfo["core"] || "";
          const core = `${coreVersion} (${metadataLink})`;
          const coreUI = versionInfo["core-ui"] || "";
          const coreAPI = versionInfo["core-api"] || "";
          const apiSpec = versionInfo["api-spec"] || "";
          const others = Object.entries(versionInfo)
            .filter(([key]) => !["core", "core-ui", "core-api", "api-spec"].includes(key))
            .map(([key, val]) => `${key}: <code>${val}</code>`)
            .join("<br>");
          return [envLink, core, coreUI, coreAPI, apiSpec, others];
        });

        $("#versionsTable").DataTable({
          data: tableData,
          columns: [
            { title: "Environment" },
            { title: "Core" },
            { title: "Core UI" },
            { title: "Core API" },
            { title: "API Spec" },
            { title: "Other" }
          ],
          pageLength: 25,
          responsive: true
        });
      } catch (err) {
        document.body.insertAdjacentHTML("beforeend", "<p style=\"color:red;\">Failed to load version data.</p>");
        console.error(err);
      }
    }

    populateTable();

  </script>
</body>
</html>
