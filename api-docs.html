<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelvin API Documentation</title>
  <link rel="icon" href="https://kelvin.ai/favicon.ico" />
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }
    #api-reference {
      height: 100vh;
    }
  </style>
  <script>
    // Get theme from localStorage and apply it before page renders
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') {
      document.documentElement.classList.add('light-mode');
      document.documentElement.style.colorScheme = 'light';
    } else {
      document.documentElement.style.colorScheme = 'dark';
    }
  </script>
</head>
<body>
  <div id="api-reference"></div>

  <!-- Load Scalar from CDN -->
  <script type="module">
    import { ApiReference } from 'https://cdn.jsdelivr.net/npm/@scalar/api-reference';

    const savedTheme = localStorage.getItem('theme') || 'dark';
    const configuration = {
      spec: {
        url: './openapi.json',
      },
      theme: savedTheme === 'light' ? 'default' : 'moon',
    };

    ApiReference(document.getElementById('api-reference'), configuration);

    // Listen for theme changes from other pages
    window.addEventListener('storage', (e) => {
      if (e.key === 'theme') {
        location.reload();
      }
    });
  </script>
</body>
</html>
