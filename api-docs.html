<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelvin API Documentation</title>
  <link rel="icon" href="https://kelvin.ai/favicon.ico" />
</head>
<body>
  <!-- Scalar API Reference -->
  <script id="api-reference"></script>

  <!-- Load Scalar from CDN -->

  <script>

    const OPENAPI_SPEC_URL = './openapi.json';

    // Set the data-url attribute
    document.getElementById('api-reference').setAttribute('data-url', OPENAPI_SPEC_URL);
  </script>
</body>
</html>
