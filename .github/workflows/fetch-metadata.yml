name: Fetch Platform Metadata

on:
  schedule:
    # Run every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - gh-pages
    paths:
      - 'fetch-metadata.sh'
      - '.github/workflows/fetch-metadata.yml'

jobs:
  fetch-metadata:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          pip install requests

      - name: Make script executable
        run: chmod +x fetch-metadata.sh

      - name: Fetch metadata
        env:
          KEYCLOAK_USERNAME: ${{ secrets.KEYCLOAK_USERNAME }}
          KEYCLOAK_PASSWORD: ${{ secrets.KEYCLOAK_PASSWORD }}
        run: ./fetch-metadata.sh

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code metadata/ openapi.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metadata/ openapi.json
          git commit -m "Update platform metadata and OpenAPI spec [automated]"
          git push
